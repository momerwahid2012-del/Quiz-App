<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Muhammad Omer Tech Wala Quiz Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07111f;
font-family:'Poppins',sans-serif;
color:white;
padding:20px;
}

.container{
max-width:950px;
margin:auto;
background:#101b2d;
padding:30px;
border-radius:24px;
border:2px solid #00e5ff55;
box-shadow:0 0 30px rgba(0,229,255,.18);
}

.hidden{
display:none;
}

.center{
text-align:center;
}

.logo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:4px solid gold;
box-shadow:0 0 25px rgba(255,215,0,.4);
}

h1,h2,h3{
font-family:'Orbitron',sans-serif;
}

.subtitle{
margin-top:10px;
color:#b9d7ff;
}

.btn{
background:linear-gradient(90deg,#00e5ff,#00b7ff);
border:none;
padding:14px 25px;
border-radius:14px;
font-weight:700;
cursor:pointer;
margin-top:18px;
transition:.3s;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
}

input,select{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#18283f;
color:white;
font-size:16px;
}

.levels{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#16243a;
padding:20px;
border-radius:18px;
border:1px solid #00e5ff44;
}

.option{
background:#18283f;
padding:14px;
margin-top:12px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.option:hover{
background:#00cfff;
color:#00111f;
}

.progress{
width:100%;
height:14px;
background:#20324d;
border-radius:50px;
margin:20px 0;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#00e5ff;
transition:.4s;
}

.timer{
font-weight:700;
color:#00e5ff;
margin-bottom:10px;
}

canvas{
width:100%;
margin-top:20px;
border-radius:18px;
background:white;
}

.footer{
margin-top:25px;
text-align:center;
color:#9cc9ff;
}

@media(max-width:700px){

.container{
padding:18px;
}

}

</style>
</head>
<body>

<div class="container">

<div id="welcome">

<!-- YOUR LOGO -->
<img class="logo" id="mainLogo">

<h1 class="center">Muhammad Omer Tech Wala Quiz Challenge</h1>

<p class="subtitle center">Test Your Tech Skills</p>

<div class="center">
<button class="btn" onclick="showForm()">Start Quiz</button>
</div>

</div>

<div id="form" class="hidden">

<h2>Student Information</h2>

<input type="text" id="studentName" maxlength="28" placeholder="Enter Full Name">

<select id="campus">

<option value="">Select Campus</option>

<optgroup label="Rehan School">
<option>Rehan School Online Academy</option>
<option>Rehan School Korangi Campus</option>
<option>Rehan School Hyderabad Campus</option>
</optgroup>

<optgroup label="Other Students">
<option>Other School / College</option>
</optgroup>

</select>

<input type="text" id="otherCampus" class="hidden" placeholder="Enter School / College Name">

<button class="btn" onclick="showLevels()">Continue</button>

</div>

<div id="levels" class="hidden">

<h2 class="center">Choose Quiz Level</h2>

<div class="levels">

<div class="card center">
<h3>EASY</h3>
<p>5 Simple Questions</p>
<button class="btn" onclick="startQuiz('easy')">Start</button>
</div>

<div class="card center">
<h3>MEDIUM</h3>
<p>5 Logical Questions</p>
<button class="btn" onclick="startQuiz('medium')">Start</button>
</div>

<div class="card center">
<h3>HARD</h3>
<p>5 Advanced Questions</p>
<button class="btn" onclick="startQuiz('hard')">Start</button>
</div>

</div>

</div>

<div id="quiz" class="hidden">

<div class="timer">
Time Left: <span id="time">20</span>s
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<h2 id="question"></h2>

<div id="options"></div>

</div>

<div id="result" class="hidden">

<h2 class="center">Quiz Results</h2>

<div class="card" style="line-height:2">

<p><b>Name:</b> <span id="rName"></span></p>

<p><b>Campus:</b> <span id="rCampus"></span></p>

<p><b>Score:</b> <span id="rScore"></span></p>

<p><b>Percentage:</b> <span id="rPercentage"></span></p>

<p><b>Grade:</b> <span id="rGrade"></span></p>

</div>

<div class="center">

<button class="btn" onclick="downloadCertificate()">
Download Certificate
</button>

<button class="btn" onclick="restartQuiz()">
Retake Quiz
</button>

</div>

<canvas id="certificate" width="1200" height="800"></canvas>

</div>

<div class="footer">
Made by Muhammad Omer Tech Wala
</div>

</div>

<script>

/* =========================================
PUT YOUR BASE64 LOGOS HERE
========================================= */

// YOUR LOGO
const myLogoBase64 =
"ChatGPT Image Jun 11, 2026, 10_44_13 AM.png"

// REHAN SCHOOL LOGO
const rehanLogoBase64 =
"Rehan School Logo.png"

document.getElementById("mainLogo").src = myLogoBase64

/* =========================================
QUIZ QUESTIONS
========================================= */

const quizData = {

easy:[

{
q:"What does CPU stand for?",
o:[
"Central Process Unit",
"Central Processing Unit",
"Computer Power Unit",
"Control Processing Unit"
],
a:"Central Processing Unit"
},

{
q:"Which device is used to move the cursor?",
o:[
"Keyboard",
"Mouse",
"Printer",
"Speaker"
],
a:"Mouse"
},

{
q:"Which company created Windows?",
o:[
"Apple",
"Google",
"Microsoft",
"Samsung"
],
a:"Microsoft"
},

{
q:"What does AI stand for?",
o:[
"Artificial Intelligence",
"Automatic Internet",
"Advanced Information",
"Artificial Internet"
],
a:"Artificial Intelligence"
},

{
q:"Which app is mostly used for watching videos?",
o:[
"Calculator",
"YouTube",
"Notes",
"Camera"
],
a:"YouTube"
}

],

medium:[

{
q:"Which password is strongest?",
o:[
"123456",
"password",
"Omer@2026Tech",
"abc123"
],
a:"Omer@2026Tech"
},

{
q:"What should you do before downloading a file?",
o:[
"Trust every website",
"Check if website is safe",
"Turn off internet",
"Ignore warnings"
],
a:"Check if website is safe"
},

{
q:"Which storage is larger?",
o:[
"MB",
"KB",
"GB",
"Byte"
],
a:"GB"
},

{
q:"If internet speed increases, what happens?",
o:[
"Videos load faster",
"Phone becomes bigger",
"Battery disappears",
"Screen changes color"
],
a:"Videos load faster"
},

{
q:"Which is used for online meetings?",
o:[
"Zoom",
"Paint",
"Calculator",
"Gallery"
],
a:"Zoom"
}

],

hard:[

{
q:"Which technology helps protect online accounts?",
o:[
"Weak passwords",
"Two-Factor Authentication",
"Turning off updates",
"Sharing passwords"
],
a:"Two-Factor Authentication"
},

{
q:"What is phishing?",
o:[
"A video game",
"A cyber scam to steal information",
"A computer screen",
"A programming language"
],
a:"A cyber scam to steal information"
},

{
q:"Which language is mostly used for web page structure?",
o:[
"HTML",
"Excel",
"Photoshop",
"Windows"
],
a:"HTML"
},

{
q:"What does cloud storage mean?",
o:[
"Storage inside clouds",
"Saving files online",
"Computer fan system",
"Hidden computer folder"
],
a:"Saving files online"
},

{
q:"Which technology allows machines to learn from data?",
o:[
"Bluetooth",
"Machine Learning",
"Calculator",
"Keyboard"
],
a:"Machine Learning"
}

]

}

let currentQuiz = []
let currentIndex = 0
let score = 0
let timer
let timeLeft = 20

document.getElementById("campus")
.addEventListener("change",()=>{

const campus =
document.getElementById("campus").value

document.getElementById("otherCampus")
.classList.toggle(
"hidden",
campus !== "Other School / College"
)

})

function hideAll(){

[
"welcome",
"form",
"levels",
"quiz",
"result"
].forEach(id=>{

document.getElementById(id)
.classList.add("hidden")

})

}

function showForm(){

hideAll()

document.getElementById("form")
.classList.remove("hidden")

}

function showLevels(){

const name =
document.getElementById("studentName")
.value.trim()

const campus =
document.getElementById("campus")
.value

if(!name || !campus){

alert("Please fill all fields")

return

}

hideAll()

document.getElementById("levels")
.classList.remove("hidden")

}

function startQuiz(level){

currentQuiz = quizData[level]

currentIndex = 0
score = 0

hideAll()

document.getElementById("quiz")
.classList.remove("hidden")

showQuestion()

}

function showQuestion(){

clearInterval(timer)

if(currentIndex >= currentQuiz.length){

showResult()

return

}

timeLeft = 20

document.getElementById("time")
.innerText = timeLeft

timer = setInterval(()=>{

timeLeft--

document.getElementById("time")
.innerText = timeLeft

if(timeLeft <= 0){

currentIndex++

showQuestion()

}

},1000)

const q = currentQuiz[currentIndex]

document.getElementById("question")
.innerText = q.q

const optionsDiv =
document.getElementById("options")

optionsDiv.innerHTML = ""

q.o.forEach(option=>{

const div =
document.createElement("div")

div.className = "option"

div.innerText = option

div.onclick = ()=>{

if(option === q.a){

score++

}

currentIndex++

showQuestion()

}

optionsDiv.appendChild(div)

})

document.getElementById("bar")
.style.width =
((currentIndex/currentQuiz.length)*100)+"%"

}

function showResult(){

hideAll()

document.getElementById("result")
.classList.remove("hidden")

const name =
document.getElementById("studentName")
.value

let campus =
document.getElementById("campus")
.value

if(campus === "Other School / College"){

campus =
document.getElementById("otherCampus")
.value

}

const percentage =
Math.round(
(score/currentQuiz.length)*100
)

let grade = "D"

if(percentage >= 90) grade = "A+"
else if(percentage >= 80) grade = "A"
else if(percentage >= 70) grade = "B"
else if(percentage >= 60) grade = "C"

document.getElementById("rName")
.innerText = name

document.getElementById("rCampus")
.innerText = campus

document.getElementById("rScore")
.innerText = score + "/5"

document.getElementById("rPercentage")
.innerText = percentage + "%"

document.getElementById("rGrade")
.innerText = grade

drawCertificate(
name,
campus,
percentage,
grade
)

}

function fitText(
ctx,
text,
maxWidth,
startSize
){

let size = startSize

ctx.font =
"bold " + size + "px Poppins"

while(
ctx.measureText(text).width > maxWidth
&& size > 24
){

size--

ctx.font =
"bold " + size + "px Poppins"

}

return size

}

function drawCertificate(
name,
campus,
percentage,
grade
){

const canvas =
document.getElementById("certificate")

const ctx =
canvas.getContext("2d")

ctx.clearRect(0,0,1200,800)

const gradient =
ctx.createLinearGradient(0,0,1200,800)

gradient.addColorStop(0,"#07111f")
gradient.addColorStop(1,"#18365d")

ctx.fillStyle = gradient

ctx.fillRect(0,0,1200,800)

ctx.strokeStyle = "gold"

ctx.lineWidth = 10

ctx.strokeRect(35,35,1130,730)

/* MY LOGO */

const myLogo = new Image()
myLogo.src = "ChatGPT Image Jun 11, 2026, 10_44_13 AM.png"

myLogo.onload = function(){

ctx.drawImage(myLogo,90,70,130,130)

}
myLogo.src = myLogoBase64

myLogo.onload = function(){

ctx.drawImage(
myLogo,
90,
70,
130,
130
)

}

/* REHAN LOGO */

const rehanLogo = new Image()

rehanLogo.src = rehanLogoBase64

rehanLogo.onload = function(){

ctx.drawImage(
rehanLogo,
980,
70,
130,
130
)

}

/* TEXT */

ctx.textAlign = "center"

ctx.fillStyle = "gold"

ctx.font = "bold 48px Orbitron"

ctx.fillText(
"Certificate of Achievement",
600,
150
)

ctx.fillStyle = "#dbeaff"

ctx.font = "28px Poppins"

ctx.fillText(
"This certificate is proudly awarded to",
600,
245
)

const size =
fitText(ctx,name,850,58)

ctx.font =
"bold " + size + "px Poppins"

ctx.fillStyle = "#00e5ff"

ctx.fillText(
name,
600,
340
)

ctx.fillStyle = "#ffffff"

ctx.font = "26px Poppins"

ctx.fillText(
"for successfully completing the",
600,
420
)

ctx.fillStyle = "gold"

ctx.font = "bold 34px Poppins"

ctx.fillText(
"Muhammad Omer Tech Wala Tech Quiz Challenge",
600,
480
)

ctx.fillStyle = "#dbeaff"

ctx.font = "24px Poppins"

ctx.fillText(
"and demonstrating excellent technology knowledge and skills.",
600,
540
)

/* INFO BOX */

ctx.fillStyle = "#12253e"

ctx.fillRect(
130,
610,
940,
110
)

ctx.fillStyle = "#ffffff"

ctx.font = "bold 22px Poppins"

ctx.fillText(
"Campus: " + campus,
320,
655
)

ctx.fillText(
"Percentage: " + percentage + "%",
860,
655
)

ctx.fillText(
"Grade: " + grade,
320,
700
)

const certificateID =
"MOTW-" +
Math.floor(Math.random()*999999)

ctx.fillText(
"Certificate ID: " + certificateID,
860,
700
)

ctx.fillStyle = "#9cc9ff"

ctx.font = "20px Poppins"

const date =
new Date().toLocaleDateString()

ctx.fillText(
"Date: " + date,
600,
760
)

}

function downloadCertificate(){

const canvas =
document.getElementById("certificate")

const link =
document.createElement("a")

link.download = "certificate.png"

link.href =
canvas.toDataURL()

link.click()

}

function restartQuiz(){

hideAll()

document.getElementById("levels")
.classList.remove("hidden")

}

</script>

</body>
</html>
